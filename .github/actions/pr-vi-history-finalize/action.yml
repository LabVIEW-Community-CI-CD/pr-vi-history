name: pr-vi-history-finalize
description: Normalize outputs, emit summary envelope, and enforce gate policy.
inputs:
  pair_count:
    required: true
    description: Effective pair count
  pair_total_count:
    required: true
    description: Total pair count
  summary_path:
    required: false
    default: ""
    description: Windows lane summary path
  manifest_path:
    required: true
    description: Manifest path
  results_root:
    required: true
    description: Results root
  target_count:
    required: false
    default: "0"
    description: Windows target count
  completed_count:
    required: false
    default: "0"
    description: Windows completed count
  diff_count:
    required: false
    default: "0"
    description: Windows diff count
  markdown_path:
    required: false
    default: ""
    description: Markdown summary path
  artifact_name:
    required: true
    description: Artifact name
  windows_lane_status:
    required: true
    description: Windows lane status
  linux_lane_status:
    required: false
    default: "skipped"
    description: Linux lane status
  windows_capture_path:
    required: false
    default: ""
    description: Windows capture path
  linux_smoke_summary_path:
    required: false
    default: ""
    description: Linux smoke summary path
  toolchain_contract_path:
    required: false
    default: ""
    description: Toolchain contract path
  enable_linux_smoke:
    required: false
    default: "true"
    description: Linux lane enabled flag
outputs:
  summary_path:
    description: Summary path output
    value: ${{ steps.finalize.outputs.summary_path }}
  results_root:
    description: Results root output
    value: ${{ steps.finalize.outputs.results_root }}
  manifest_path:
    description: Manifest path output
    value: ${{ steps.finalize.outputs.manifest_path }}
  pair_count:
    description: Pair count
    value: ${{ steps.finalize.outputs.pair_count }}
  pair_total_count:
    description: Pair total count
    value: ${{ steps.finalize.outputs.pair_total_count }}
  pair_truncated:
    description: Pair truncated flag
    value: ${{ steps.finalize.outputs.pair_truncated }}
  target_count:
    description: Target count
    value: ${{ steps.finalize.outputs.target_count }}
  completed_count:
    description: Completed count
    value: ${{ steps.finalize.outputs.completed_count }}
  diff_count:
    description: Diff count
    value: ${{ steps.finalize.outputs.diff_count }}
  markdown_path:
    description: Markdown path
    value: ${{ steps.finalize.outputs.markdown_path }}
  artifact_name:
    description: Artifact name
    value: ${{ steps.finalize.outputs.artifact_name }}
  windows_lane_status:
    description: Windows lane status
    value: ${{ steps.finalize.outputs.windows_lane_status }}
  linux_lane_status:
    description: Linux lane status
    value: ${{ steps.finalize.outputs.linux_lane_status }}
  windows_capture_path:
    description: Windows capture path
    value: ${{ steps.finalize.outputs.windows_capture_path }}
  linux_smoke_summary_path:
    description: Linux smoke summary path
    value: ${{ steps.finalize.outputs.linux_smoke_summary_path }}
  toolchain_contract_path:
    description: Toolchain contract path
    value: ${{ steps.finalize.outputs.toolchain_contract_path }}
runs:
  using: composite
  steps:
    - id: finalize
      shell: pwsh
      env:
        INPUT_PAIR_COUNT: ${{ inputs.pair_count }}
        INPUT_PAIR_TOTAL_COUNT: ${{ inputs.pair_total_count }}
        INPUT_SUMMARY_PATH: ${{ inputs.summary_path }}
        INPUT_RESULTS_ROOT: ${{ inputs.results_root }}
        INPUT_MANIFEST_PATH: ${{ inputs.manifest_path }}
        INPUT_TARGET_COUNT: ${{ inputs.target_count }}
        INPUT_COMPLETED_COUNT: ${{ inputs.completed_count }}
        INPUT_DIFF_COUNT: ${{ inputs.diff_count }}
        INPUT_MARKDOWN_PATH: ${{ inputs.markdown_path }}
        INPUT_ARTIFACT_NAME: ${{ inputs.artifact_name }}
        INPUT_WINDOWS_LANE_STATUS: ${{ inputs.windows_lane_status }}
        INPUT_LINUX_LANE_STATUS: ${{ inputs.linux_lane_status }}
        INPUT_WINDOWS_CAPTURE_PATH: ${{ inputs.windows_capture_path }}
        INPUT_LINUX_SMOKE_SUMMARY_PATH: ${{ inputs.linux_smoke_summary_path }}
        INPUT_TOOLCHAIN_CONTRACT_PATH: ${{ inputs.toolchain_contract_path }}
        INPUT_ENABLE_LINUX_SMOKE: ${{ inputs.enable_linux_smoke }}
      run: |
        Set-StrictMode -Version Latest
        $ErrorActionPreference = 'Stop'

        $pairCount = 0
        [void][int]::TryParse($env:INPUT_PAIR_COUNT, [ref]$pairCount)
        $pairTotalCount = $pairCount
        [void][int]::TryParse($env:INPUT_PAIR_TOTAL_COUNT, [ref]$pairTotalCount)
        if ($pairTotalCount -lt $pairCount) {
          $pairTotalCount = $pairCount
        }
        $pairTruncated = $pairTotalCount -gt $pairCount

        $windowsStatus = ($env:INPUT_WINDOWS_LANE_STATUS ?? '').Trim().ToLowerInvariant()
        if ([string]::IsNullOrWhiteSpace($windowsStatus)) {
          $windowsStatus = 'unknown'
        }

        $linuxStatus = ($env:INPUT_LINUX_LANE_STATUS ?? '').Trim().ToLowerInvariant()
        if ([string]::IsNullOrWhiteSpace($linuxStatus)) {
          $linuxStatus = 'skipped'
        }
        $linuxEnabled = [string]::Equals(($env:INPUT_ENABLE_LINUX_SMOKE ?? ''), 'true', [System.StringComparison]::OrdinalIgnoreCase)
        if (-not $linuxEnabled) {
          $linuxStatus = 'skipped'
        }

        $summaryPathInput = $env:INPUT_SUMMARY_PATH ?? ''
        $resultsRootInput = $env:INPUT_RESULTS_ROOT ?? ''
        $manifestPathInput = $env:INPUT_MANIFEST_PATH ?? ''
        $targetCountInput = $env:INPUT_TARGET_COUNT ?? '0'
        $completedCountInput = $env:INPUT_COMPLETED_COUNT ?? '0'
        $diffCountInput = $env:INPUT_DIFF_COUNT ?? '0'
        $markdownPathInput = $env:INPUT_MARKDOWN_PATH ?? ''
        $artifactNameInput = $env:INPUT_ARTIFACT_NAME ?? ''
        $windowsCapturePathInput = $env:INPUT_WINDOWS_CAPTURE_PATH ?? ''
        $linuxSmokeSummaryPathInput = $env:INPUT_LINUX_SMOKE_SUMMARY_PATH ?? ''
        $toolchainContractPathInput = $env:INPUT_TOOLCHAIN_CONTRACT_PATH ?? ''

        Add-Content -LiteralPath $env:GITHUB_OUTPUT -Value ("summary_path={0}" -f $summaryPathInput) -Encoding utf8
        Add-Content -LiteralPath $env:GITHUB_OUTPUT -Value ("results_root={0}" -f $resultsRootInput) -Encoding utf8
        Add-Content -LiteralPath $env:GITHUB_OUTPUT -Value ("manifest_path={0}" -f $manifestPathInput) -Encoding utf8
        Add-Content -LiteralPath $env:GITHUB_OUTPUT -Value ("pair_count={0}" -f $pairCount) -Encoding utf8
        Add-Content -LiteralPath $env:GITHUB_OUTPUT -Value ("pair_total_count={0}" -f $pairTotalCount) -Encoding utf8
        Add-Content -LiteralPath $env:GITHUB_OUTPUT -Value ("pair_truncated={0}" -f $pairTruncated.ToString().ToLowerInvariant()) -Encoding utf8
        Add-Content -LiteralPath $env:GITHUB_OUTPUT -Value ("target_count={0}" -f $targetCountInput) -Encoding utf8
        Add-Content -LiteralPath $env:GITHUB_OUTPUT -Value ("completed_count={0}" -f $completedCountInput) -Encoding utf8
        Add-Content -LiteralPath $env:GITHUB_OUTPUT -Value ("diff_count={0}" -f $diffCountInput) -Encoding utf8
        Add-Content -LiteralPath $env:GITHUB_OUTPUT -Value ("markdown_path={0}" -f $markdownPathInput) -Encoding utf8
        Add-Content -LiteralPath $env:GITHUB_OUTPUT -Value ("artifact_name={0}" -f $artifactNameInput) -Encoding utf8
        Add-Content -LiteralPath $env:GITHUB_OUTPUT -Value ("windows_lane_status={0}" -f $windowsStatus) -Encoding utf8
        Add-Content -LiteralPath $env:GITHUB_OUTPUT -Value ("linux_lane_status={0}" -f $linuxStatus) -Encoding utf8
        Add-Content -LiteralPath $env:GITHUB_OUTPUT -Value ("windows_capture_path={0}" -f $windowsCapturePathInput) -Encoding utf8
        Add-Content -LiteralPath $env:GITHUB_OUTPUT -Value ("linux_smoke_summary_path={0}" -f $linuxSmokeSummaryPathInput) -Encoding utf8
        Add-Content -LiteralPath $env:GITHUB_OUTPUT -Value ("toolchain_contract_path={0}" -f $toolchainContractPathInput) -Encoding utf8

        Add-Content -LiteralPath $env:GITHUB_STEP_SUMMARY -Value '### PR VI history lane summary'
        Add-Content -LiteralPath $env:GITHUB_STEP_SUMMARY -Value ''
        Add-Content -LiteralPath $env:GITHUB_STEP_SUMMARY -Value ("- Windows lane: **{0}**" -f $windowsStatus)
        Add-Content -LiteralPath $env:GITHUB_STEP_SUMMARY -Value ("- Linux lane: **{0}**" -f $linuxStatus)
        Add-Content -LiteralPath $env:GITHUB_STEP_SUMMARY -Value ("- Pair count: **{0}** (total changed: **{1}**)" -f $pairCount, $pairTotalCount)
        if ($pairTruncated) {
          Add-Content -LiteralPath $env:GITHUB_STEP_SUMMARY -Value '- Pair list was truncated by `max_targets`.'
        }
        if (-not [string]::IsNullOrWhiteSpace($windowsCapturePathInput)) {
          Add-Content -LiteralPath $env:GITHUB_STEP_SUMMARY -Value ('- Windows capture: ' + $windowsCapturePathInput)
        }
        if (-not [string]::IsNullOrWhiteSpace($linuxSmokeSummaryPathInput)) {
          Add-Content -LiteralPath $env:GITHUB_STEP_SUMMARY -Value ('- Linux smoke summary: ' + $linuxSmokeSummaryPathInput)
        }
        if (-not [string]::IsNullOrWhiteSpace($toolchainContractPathInput)) {
          Add-Content -LiteralPath $env:GITHUB_STEP_SUMMARY -Value ('- Toolchain contract: ' + $toolchainContractPathInput)
        }

        if ($windowsStatus -ne 'success') {
          throw ("Windows lane is hard-gated and must succeed. Current status: {0}" -f $windowsStatus)
        }
